name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # Static site — no build step. enablement:true creates the Pages site
      # on first run so no manual Settings→Pages step is needed.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      # GitHub Pages intermittently returns "Deployment failed, try again
      # later" (seen on the Elmac deploys, 5 Jul 2026 — build green both
      # times). First attempt may fail; a second runs after a pause. If both
      # fail, the job fails for real.
      - id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Pause before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 45
      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
